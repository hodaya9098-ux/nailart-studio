<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inbal Moshe | Makeup & Nails - פאנל ניהול</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="topbar">
    <a href="index.html" class="back-home">← חזרה לבית</a>
    <span class="topbar-logo">💅 Inbal Moshe</span>
    <a href="https://wa.me/972503927121?text=%D7%A9%D7%9C%D7%95%D7%9D%20%D7%A2%D7%99%D7%A0%D7%91%D7%9C!%20%D7%A8%D7%A6%D7%99%D7%AA%D7%99%20%D7%9C%D7%A9%D7%90%D7%95%D7%9C%20%D7%A9%D7%90%D7%9C%D7%94%20%D7%9C%D7%A4%D7%A0%D7%99%20%D7%A9%D7%90%D7%A0%D7%99%20%D7%A7%D7%95%D7%91%D7%A2%D7%AA%20%D7%AA%D7%95%D7%A8%20%F0%9F%92%85" target="_blank" class="wa-contact-btn">
      <span class="wa-icon">💬</span> צרי קשר
    </a>
  </div>

  <main class="page-main">
    <div class="page-header">
      <h2>🔧 פאנל ניהול</h2>
      <p class="section-subtitle">ניהול זמינות המטפלת</p>
    </div>

    <!-- כניסה -->
    <div id="adminLogin" class="admin-box">
      <h3>כניסה למנהל</h3>
      <input type="password" id="adminPass" placeholder="הכניסי סיסמה" onkeydown="if(event.key==='Enter') adminLogin()">
      <button onclick="adminLogin()">כניסה</button>
      <p id="adminError" class="confirm-msg error"></p>
    </div>

    <!-- פאנל ניהול -->
    <div id="adminPanel" class="hidden">

      <div class="admin-section">
        <h3>ימי עבודה שבועיים</h3>
        <p class="section-subtitle">בחרי אילו ימים את עובדת</p>
        <div class="working-days-grid" id="workingDaysGrid"></div>
        <button onclick="saveWorkingDays()">שמרי</button>
        <p id="savedMsg" class="confirm-msg"></p>
      </div>

      <div class="admin-section">
        <h3>חסימת תאריך ספציפי</h3>
        <p class="section-subtitle">חופשה, מנוחה, יום פרטי</p>
        <div class="admin-row">
          <input type="date" id="blockDateInput">
          <button onclick="blockDate()">חסמי תאריך</button>
        </div>
        <div id="blockedList" class="blocked-list"></div>
      </div>

      <div class="admin-section">
        <h3>תורים שנקבעו</h3>
        <div id="appointmentsList" class="appointments-list"></div>
        <button class="btn-danger" onclick="clearAllAppointments()">מחקי את כל התורים</button>
      </div>

      <div class="page-action" style="margin-top:10px">
        <button class="back-btn" onclick="adminLogout()">התנתקי</button>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-content">
      <p>💅 Inbal Moshe &copy; 2025</p>
      <a href="https://www.instagram.com/inbalmoshe.makeup.nails/" target="_blank" class="footer-insta">📸 @inbalmoshe.makeup.nails</a>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
